name: Publish images

on:
  push:
    branches:
      - main
    paths:
      - "*.dockerfile"
  pull_request:
    paths:
      - "*.dockerfile"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changed-dockerfiles:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      dockerfiles: ${{ steps.changed.outputs.dockerfiles }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Collect changed Dockerfiles
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          dockerfiles="$(
            git diff --no-renames --diff-filter=ACM --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.dockerfile' |
              awk -F/ 'NF == 1' |
              jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"
          echo "dockerfiles=$dockerfiles" >> "$GITHUB_OUTPUT"

  smoketest:
    if: github.event_name == 'pull_request' && needs.changed-dockerfiles.outputs.dockerfiles != '[]'
    needs: changed-dockerfiles
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJSON(needs.changed-dockerfiles.outputs.dockerfiles) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build changed Dockerfile
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false

  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        openssl:
          - openssl-1.1.1
          - openssl-3.0
          - openssl-3.2
          - openssl-3.3
          - openssl-3.4
          - openssl-3.5
          - openssl-3.6
          - openssl-4.0
          - boringssl
          - libressl-3.9
          - libressl-4.0
          - libressl-4.1
          - libressl-4.2
          - libressl-4.3
          - aws-lc
        platform:
          - amd64
          - arm64
        include:
          - platform: amd64
            runner: ubuntu-24.04
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: ${{ matrix.openssl }}.dockerfile
          context: .
          push: true
          platforms: linux/${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest-${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}

  merge:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        openssl:
          - openssl-1.1.1
          - openssl-3.0
          - openssl-3.2
          - openssl-3.3
          - openssl-3.4
          - openssl-3.5
          - openssl-3.6
          - openssl-4.0
          - boringssl
          - libressl-3.9
          - libressl-4.0
          - libressl-4.1
          - libressl-4.2
          - libressl-4.3
          - aws-lc
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest \
            ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest-amd64 \
            ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest-arm64
