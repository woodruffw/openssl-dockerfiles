name: Publish images

on:
  push:
    branches:
      - main
    paths:
      - "*.dockerfile"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        openssl:
          - openssl-1.1.1
          - openssl-3.0
          - openssl-3.2
          - openssl-3.3
          - openssl-3.4
          - openssl-3.5
          - openssl-3.6
          - boringssl
          - libressl-3.9
          - libressl-4.0
          - libressl-4.1
          - libressl-4.2
        platform:
          - amd64
          - arm64
        include:
          - platform: amd64
            runner: ubuntu-24.04
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          file: ${{ matrix.openssl }}.dockerfile
          context: .
          push: true
          platforms: linux/${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest-${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}

  merge:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        openssl:
          - openssl-1.1.1
          - openssl-3.0
          - openssl-3.2
          - openssl-3.3
          - openssl-3.4
          - openssl-3.5
          - openssl-3.6
          - boringssl
          - libressl-3.9
          - libressl-4.0
          - libressl-4.1
          - libressl-4.2
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest \
            ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest-amd64 \
            ghcr.io/${{ github.repository }}/${{ matrix.openssl }}:latest-arm64
